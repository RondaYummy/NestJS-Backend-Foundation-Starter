services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports: ['5432:5432']
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d app']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    image: nestjs-backend-foundation-starter:local
    build:
      context: .
      target: development
    command: npm run db:migrate
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    # profiles:
    #   - tools

  api:
    image: nestjs-backend-foundation-starter:local
    build:
      context: .
      target: development
    command: npm run start:dev:api
    env_file: .env
    ports: ['3000:3000']
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    image: nestjs-backend-foundation-starter:local
    build:
      context: .
      target: development
    command: npm run start:dev:worker
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    stop_grace_period: 60s

  cron:
    image: nestjs-backend-foundation-starter:local
    build:
      context: .
      target: development
    command: npm run start:dev:cron
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
