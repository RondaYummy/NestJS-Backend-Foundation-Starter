services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD}']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  migrations:
    image: ${APP_IMAGE}
    command: ['npm', 'run', 'start:prod:migrations']
    env_file:
      - .env
    environment:
      MIGRATIONS_FOLDER: /app/drizzle
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  api:
    image: ${APP_IMAGE}
    command: ['npm', 'run', 'start:prod:api']
    env_file:
      - .env
    restart: unless-stopped
    init: true
    ports:
      - '3000:3000'
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health/live').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s
    networks:
      - backend

  worker:
    image: ${APP_IMAGE}
    command: ['npm', 'run', 'start:prod:worker']
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    stop_grace_period: 60s
    networks:
      - backend

  cron:
    image: ${APP_IMAGE}
    command: ['npm', 'run', 'start:prod:cron']
    env_file:
      - .env
    restart: unless-stopped
    init: true
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
